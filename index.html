<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="ゼフィラトリクス公式サイト — Zephira-To-Ricushu"
    />
    <meta name="theme-color" content="#0a0f1d" />
    <title>ゼフィラトリクス公式サイト | Zephira-To-Ricushu</title>
    <link rel="icon" href="assets/zephira-profile.jpg" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500&family=Noto+Sans+JP:wght@400;500&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css" />
    <script src="script.js" defer></script>
  </head>
  <body>
    <div class="noise" aria-hidden="true"></div>
    <div class="cursor-glow" aria-hidden="true"></div>

    <main>
      <section class="hero" aria-labelledby="site-title">
        <div class="hero-layout">
          <div class="intro">
            <div class="profile">
              <img
                src="assets/zephira-profile.jpg"
                alt="ゼフィラトリクスのプロフィールアイコン"
                width="600"
                height="600"
              />
              <div>
                <p class="eyebrow">Official website</p>
                <p class="profile-name">Zephira-To-Ricushu</p>
              </div>
            </div>

            <div class="title-block">
              <h1 id="site-title">
                <span>ゼフィラトリクス</span>
                <span>公式サイト</span>
              </h1>
              <p>ゲーム制作と日々の活動を発信しています。</p>
            </div>

            <p class="intro-note">
              YouTube・X・公開中の自作ゲームはこちらから。
            </p>
          </div>

          <aside class="link-panel" aria-label="公式リンク">
            <header class="panel-heading">
              <p>Official links</p>
              <h2>リンク</h2>
            </header>

            <section class="link-group" aria-labelledby="channel-links">
              <h3 id="channel-links">Channel &amp; Social</h3>
              <div class="link-list">
                <a
                  class="link-item"
                  href="https://www.youtube.com/@Zephira-TO-Ricushu"
                  target="_blank"
                  rel="noopener noreferrer"
                >
                  <span class="link-symbol youtube" aria-hidden="true">▶</span>
                  <span class="link-copy">
                    <strong>YouTube</strong>
                    <small>ゼフィラトリクス公式チャンネル</small>
                  </span>
                  <span class="link-arrow" aria-hidden="true">↗</span>
                </a>

                <a
                  class="link-item"
                  href="https://x.com/ZephiraTRicushu"
                  target="_blank"
                  rel="noopener noreferrer"
                >
                  <span class="link-symbol" aria-hidden="true">X</span>
                  <span class="link-copy">
                    <strong>X（日常）</strong>
                    <small>@ZephiraTRicushu</small>
                  </span>
                  <span class="link-arrow" aria-hidden="true">↗</span>
                </a>

                <a
                  class="link-item"
                  href="https://x.com/60e5uGiRar36489"
                  target="_blank"
                  rel="noopener noreferrer"
                >
                  <span class="link-symbol" aria-hidden="true">X</span>
                  <span class="link-copy">
                    <strong>X（自作ゲーム）</strong>
                    <small>@60e5uGiRar36489</small>
                  </span>
                  <span class="link-arrow" aria-hidden="true">↗</span>
                </a>
              </div>
            </section>

            <section class="link-group" aria-labelledby="game-links">
              <h3 id="game-links">Games</h3>
              <div class="link-list">
                <a
                  class="link-item"
                  href="https://freegame-mugen.jp/roleplaying/game_13492.html"
                  target="_blank"
                  rel="noopener noreferrer"
                >
                  <img
                    class="game-icon"
                    src="assets/random-relic-icon.jpg"
                    alt=""
                    width="400"
                    height="400"
                  />
                  <span class="link-copy">
                    <strong>ランダムレリック</strong>
                    <small>フリーゲーム夢現</small>
                  </span>
                  <span class="link-arrow" aria-hidden="true">↗</span>
                </a>

                <a
                  class="link-item"
                  href="https://play.google.com/store/apps/details?id=com.AllRelic&amp;hl=ja"
                  target="_blank"
                  rel="noopener noreferrer"
                >
                  <img
                    class="game-icon"
                    src="assets/all-relic-icon.png"
                    alt=""
                    width="512"
                    height="512"
                  />
                  <span class="link-copy">
                    <strong>オールレリック</strong>
                    <small>Android版</small>
                  </span>
                  <span class="link-arrow" aria-hidden="true">↗</span>
                </a>

                <div class="link-item is-disabled">
                  <img
                    class="game-icon is-muted"
                    src="assets/all-relic-icon.png"
                    alt=""
                    width="512"
                    height="512"
                  />
                  <span class="link-copy">
                    <strong>オールレリック</strong>
                    <small>iOS版</small>
                  </span>
                  <span class="coming-soon">近日公開</span>
                </div>
              </div>
            </section>
          </aside>
        </div>
      </section>
    </main>
  </body>
</html>
